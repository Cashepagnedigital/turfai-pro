<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurfAI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
    margin: 0;
}

h1 { color: #22c55e; }

.container { max-width: 500px; margin: auto; }

.card {
    background: rgba(30, 41, 59, 0.9);
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
}

button {
    background: linear-gradient(90deg, #22c55e, #4ade80);
    border: none;
    padding: 12px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
}

.pay-btn {
    background: linear-gradient(90deg, #facc15, #eab308);
    color: black;
}

.highlight {
    color: #4ade80;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🏇 TurfAI Pro</h1>
<p>🔥 Gagne au Quinté+ avec l'IA</p>

<div class="container">

<div class="card">
    <h2>🎁 Pronostic Gratuit</h2>
    <button onclick="loadFree()">Voir</button>
    <p id="free"></p>
</div>

<div class="card">
    <h2>📜 Historique Quinté+</h2>
    <div id="history"></div>
</div>

<div class="card">
    <h2>💎 Abonnement VIP</h2>
    <p class="highlight">Accès complet</p>
    <p>💰 <b>6500 CFA / mois</b></p>
    <button class="pay-btn" onclick="payer()">🔥 S'abonner</button>
</div>

<div class="card">
    <h2>🔐 Accès VIP</h2>
    <input id="vipKey" placeholder="Entrer votre clé">
    <button onclick="checkVIP()">Accéder</button>
    <p id="vip"></p>
</div>

<div class="card">
    <h2>👥 Parrainage</h2>
    <p id="refLink"></p>
    <button onclick="copyLink()">Copier</button>
    <button onclick="share()">WhatsApp</button>
</div>

</div>

<script>
const API = "https://turfai-production-788a.up.railway.app";
const PAY = "https://uazgnjsa.mychariow.shop/prd_l1336b";

// USER
let user = localStorage.getItem("user");
if (!user) {
    user = "user_" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("user", user);
}

// REF
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
if (ref) localStorage.setItem("ref", ref);

const refLink = `${window.location.origin}?ref=${user}`;
document.getElementById("refLink").innerText = refLink;

// =====================
// ✅ PRONOSTIC CORRIGÉ
// =====================
async function loadFree() {
    const el = document.getElementById("free");
    el.innerText = "Chargement...";

    try {
        const res = await fetch(API + "/quinte");

        if (!res.ok) throw new Error();

        const data = await res.json();

        if (!data.prediction || data.prediction.length === 0) {
            el.innerText = "Aucune donnée";
            return;
        }

        el.innerText = "🏇 " + data.prediction.slice(0,3).join(" - ");

    } catch {
        el.innerText = "Erreur serveur";
    }
}

// =====================
// ✅ HISTORIQUE CORRIGÉ
// =====================
async function loadHistory() {
    const container = document.getElementById("history");
    container.innerHTML = "Chargement...";

    try {
        const res = await fetch(API + "/history");

        if (!res.ok) throw new Error();

        const data = await res.json();

        if (!data || data.length === 0) {
            container.innerHTML = `
                <p>📅 Aujourd'hui → 🏇 Pronostic en cours...</p>
            `;
            return;
        }

        container.innerHTML = "";

        data.forEach(item => {
            const d = new Date(item.date);
            const dateFormatted = d.toLocaleDateString("fr-FR");

            const p = document.createElement("p");
            p.innerText = `📅 ${dateFormatted} → 🏇 ${item.prediction.join(" - ")}`;

            container.appendChild(p);
        });

    } catch {
        container.innerHTML = "Erreur chargement";
    }
}

// VIP
async function checkVIP() {
    const key = document.getElementById("vipKey").value || user;

    try {
        const res = await fetch(API + "/premium?key=" + key);
        const data = await res.json();

        if (data.access) {
            const res2 = await fetch(API + "/quinte");
            const d2 = await res2.json();

            document.getElementById("vip").innerText =
                "🏇 " + d2.prediction.join(" - ");
        } else {
            document.getElementById("vip").innerText = "❌ Non VIP";
        }
    } catch {
        document.getElementById("vip").innerText = "Erreur";
    }
}

// PAIEMENT
function payer() {
    const ref_code = localStorage.getItem("ref") || "";
    window.location.href = PAY + "?user_id=" + user + "&ref=" + ref_code;
}

// COPY
function copyLink() {
    navigator.clipboard.writeText(refLink);
    alert("Lien copié !");
}

// SHARE
function share() {
    const msg = `🏇 TurfAI Pro\n${refLink}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

// INIT
window.onload = () => {
    loadHistory();
    loadFree(); // 🔥 IMPORTANT
};
</script>

</body>
</html>
