 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurfAI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
    margin: 0;
}

h1 { color: #22c55e; margin-top: 20px; }

.container { max-width: 500px; margin: auto; }

.card {
    background: rgba(30, 41, 59, 0.95);
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
}

button {
    background: linear-gradient(90deg, #22c55e, #4ade80);
    border: none;
    padding: 12px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
    width: 90%;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 8px;
    border: none;
    margin: 10px;
}

.highlight { color: #4ade80; font-weight: bold; }
</style>
</head>

<body>

<h1>🏇 TurfAI Pro</h1>
<p>🔥 Gagne au Quinté+ avec l'IA</p>

<div class="container">

<div class="card">
    <h2>📊 Prédictions</h2>
    <button onclick="loadPrediction()">Voir</button>
    <p id="prediction"></p>
</div>

<div class="card">
    <h2>🔐 Accès VIP</h2>
    <input type="text" id="userKeyInput" placeholder="Ta clé VIP">
    <button onclick="checkPremium()">Accéder</button>
    <p id="premiumResult"></p>
</div>

<div class="card">
    <h2>💳 Abonnement VIP</h2>
    <p>6500 FCFA / mois</p>
    <button onclick="pay()">💰 Payer maintenant</button>
</div>

<div class="card">
    <h2>💰 Parrainage</h2>
    <p id="aff-link"></p>
    <button onclick="copyLink()">Copier</button>
    <button onclick="shareWhatsApp()">WhatsApp</button>
    <p>👥 <span id="aff-filleuls">0</span></p>
</div>

</div>

<script>
const API_URL = "https://turfai-pro-production.up.railway.app"; //

let userKey = localStorage.getItem("user_key");
if (!userKey) {
    userKey = "user_" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("user_key", userKey);
}

// récupérer ref
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
if (ref) localStorage.setItem("ref_code", ref);

// lien affilié
const AFF_LINK = `${window.location.origin}?ref=${userKey}`;

// paiement
function pay() {
    const ref = localStorage.getItem("ref_code") || "";
    const url = "https://uazgnjsa.mychariow.shop/prd_l1336b";

    window.location.href = url + "?user_id=" + userKey + "&ref=" + ref;
}

// prédiction
function loadPrediction() {
    fetch(`${API_URL}/quinte-pro`)
    .then(r => r.json())
    .then(d => {
        document.getElementById("prediction").innerText =
        "🏇 " + d.top5.join(" - ");
    });
}

// premium
function checkPremium() {
    const key = document.getElementById("userKeyInput").value;
    fetch(`${API_URL}/premium?key=${key}`)
    .then(r => r.json())
    .then(d => {
        document.getElementById("premiumResult").innerText =
        d.access ? "Accès OK" : "Refusé";
    });
}

// stats
function loadStats() {
    fetch(`${API_URL}/user-stats?key=${userKey}`)
    .then(r => r.json())
    .then(d => {
        document.getElementById("aff-filleuls").innerText = d.referrals;
    });
}

// share
function shareWhatsApp() {
    window.open("https://wa.me/?text=" + encodeURIComponent(AFF_LINK));
}

// copy
function copyLink() {
    navigator.clipboard.writeText(AFF_LINK);
    alert("Copié !");
}

window.onload = () => {
    document.getElementById("aff-link").innerText = AFF_LINK;
    loadStats();
};
</script>

</body>
</html>
